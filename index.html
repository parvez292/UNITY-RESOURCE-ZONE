<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNITY RESOURCE ZONE · সম্পূর্ণ সংস্করণ</title>

    <!-- PWA & Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00ffc3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co.com/BYqbZTH/IMG-20260305-064757.png">
    <link rel="icon" sizes="192x192" href="https://i.ibb.co.com/BYqbZTH/IMG-20260305-064757.png">
    <link rel="icon" sizes="512x512" href="https://i.ibb.co.com/BYqbZTH/IMG-20260305-064757.png">

    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ========== প্রিমিয়াম হ্যাকার নিওন থিম (সম্পূর্ণ সংস্করণ) ========== */
        :root {
            --bg-deep: #0a0e0f;
            --bg-card: #141a1c;
            --accent-primary: #00ffc3;
            --accent-secondary: #7b2cff;
            --accent-glow: rgba(0, 255, 195, 0.7);
            --text-head: #f0fff0;
            --text-body: #b2f0d0;
            --text-dim: #6b8b7a;
            --glass-border: rgba(0, 255, 200, 0.25);
            --gradient-prime: linear-gradient(135deg, #00ffc3, #7b2cff);
            --gradient-card: linear-gradient(145deg, rgba(20, 26, 28, 0.95), rgba(10, 20, 18, 0.98));
            --shadow-heavy: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,255,200,0.15);
            --font-display: 'Clash Display', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-body);
            font-family: var(--font-body);
            line-height: 1.5;
            min-height: 100vh;
            letter-spacing: 0.3px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: 70px; /* নিচের নেভিগেশনের জন্য জায়গা */
        }

        /* স্ক্রলবার */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a2326; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gradient-prime); border-radius: 10px; box-shadow: 0 0 15px var(--accent-primary); }

        /* ===== হেডার (লগইন বাটন সহ) ===== */
        .header {
            background: rgba(10, 14, 15, 0.85);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--glass-border);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 10px 30px -10px rgba(0,255,200,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .header-title {
            font-size: 2rem;
            font-weight: 800;
            font-family: var(--font-display);
            background: var(--gradient-prime);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0,255,195,0.5);
            letter-spacing: -0.5px;
            animation: headerShine 3s infinite;
            flex: 1;
            text-align: left;
        }

        @keyframes headerShine {
            0% { text-shadow: 0 0 10px rgba(0,255,195,0.3), 0 0 20px rgba(123,44,255,0.2); }
            50% { text-shadow: 0 0 25px rgba(0,255,195,0.9), 0 0 40px rgba(123,44,255,0.6); }
            100% { text-shadow: 0 0 10px rgba(0,255,195,0.3), 0 0 20px rgba(123,44,255,0.2); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login-btn {
            background: transparent;
            border: 1.5px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .login-btn:hover {
            background: var(--accent-primary);
            color: #0a0e0f;
            box-shadow: 0 0 15px var(--accent-primary);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--accent-secondary);
            color: var(--accent-secondary);
            padding: 5px 15px;
            border-radius: 30px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: var(--accent-secondary);
            color: #0a0e0f;
        }

        #userInfo {
            color: var(--text-head);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== লগইন/রেজিস্ট্রেশন মডাল ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: var(--gradient-card);
            border: 2px solid var(--accent-primary);
            margin: 8% auto;
            padding: 30px;
            width: 90%;
            max-width: 420px;
            border-radius: 40px;
            box-shadow: 0 0 40px var(--accent-primary);
            color: white;
            position: relative;
        }
        .close {
            color: var(--accent-primary);
            position: absolute;
            right: 25px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .close:hover { color: #fff; }
        .tab {
            overflow: hidden;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .tab button {
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px 20px;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 1.1rem;
            transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab button.active {
            color: var(--accent-primary);
            border-bottom: 2px solid var(--accent-primary);
        }
        .tabcontent { display: none; }
        .tabcontent.active { display: block; }
        .tabcontent input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
        }
        .tabcontent input:focus {
            border-color: var(--accent-primary);
            outline: none;
        }
        .tabcontent button {
            width: 100%;
            padding: 14px;
            background: var(--gradient-prime);
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .tabcontent button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--accent-primary);
        }
        .message {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #ff6b6b;
            text-align: center;
        }

        /* ===== স্ক্রিন ম্যানেজমেন্ট ===== */
        .screen {
            display: none;
            animation: fadeReveal 0.4s ease-out;
        }
        .screen.active {
            display: block;
        }
        @keyframes fadeReveal {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ===== নিচের নেভিগেশন বার ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 14, 15, 0.9);
            backdrop-filter: blur(18px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }
        .nav-item {
            color: var(--text-dim);
            font-size: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 15px;
            border-radius: 30px;
        }
        .nav-item i {
            font-size: 1.5rem;
        }
        .nav-item.active {
            color: var(--accent-primary);
            background: rgba(0, 255, 200, 0.1);
        }
        .nav-item:hover {
            color: var(--accent-primary);
        }

        /* ===== পোস্ট গ্রিড (মূল পেজ) ===== */
        .posts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            padding: 20px 12px;
        }
        @media (min-width: 900px) {
            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* পোস্ট কার্ড */
        .post-card {
            background: var(--gradient-card);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.2,0.9,0.3,1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-heavy);
            backdrop-filter: blur(8px);
            width: 100%;
            display: flex;
            flex-direction: column;
        }
        .post-card::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 2px;
            border-radius: 32px;
            background: var(--gradient-prime);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.3;
            transition: opacity 0.4s;
            pointer-events: none;
        }
        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 50px rgba(0,255,200,0.3);
        }
        .post-card:hover::before {
            opacity: 0.9;
        }

        /* স্লাইডার */
        .card-slider {
            width: 100%;
            height: 220px;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            margin-bottom: 15px;
            border: 2px solid transparent;
            background: var(--bg-deep);
            box-shadow: 0 10px 20px rgba(0,0,0,0.7);
        }
        .slider-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .slider-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .slider-img.active {
            opacity: 1;
            z-index: 1;
        }

        /* ট্যাগ কর্নার */
        .category-tag-corner {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid var(--accent-primary);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(0,255,200,0.2);
            z-index: 10;
            opacity: 0.7;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .post-card:hover .category-tag-corner {
            opacity: 1;
            box-shadow: 0 0 20px var(--accent-primary);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: var(--font-display);
            background: linear-gradient(135deg, #fff, var(--accent-primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .card-desc {
            color: var(--text-body);
            font-size: 0.95rem;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            opacity: 0.9;
        }

        /* ফেবারিট বাটন */
        .favorite-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            z-index: 11;
            backdrop-filter: blur(5px);
        }
        .favorite-btn.active {
            background: var(--accent-primary);
            color: #0a0e0f;
        }
        .favorite-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-primary);
        }

        /* বিস্তারিত বাটন */
        .detail-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(0, 255, 200, 0.08);
            border: 1.5px solid var(--accent-primary);
            color: var(--accent-primary);
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            margin-top: 10px;
            overflow: hidden;
            isolation: isolate;
        }
        .detail-btn i { font-size: 1.1rem; position: relative; z-index: 2; }
        .detail-btn span { position: relative; z-index: 2; }
        .detail-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 200, 0.4), transparent);
            transform: skewX(-25deg);
            animation: beam 3s infinite ease-in-out;
            z-index: 1;
        }
        .detail-btn:hover {
            background: var(--accent-primary);
            color: #0a0e0f;
            box-shadow: 0 0 25px var(--accent-primary);
        }
        @keyframes beam {
            0% { left: -150%; }
            30% { left: 100%; }
            100% { left: 100%; }
        }

        /* ===== ডিটেইল পৃষ্ঠা ===== */
        .detail-container {
            background: var(--gradient-card);
            border-radius: 40px;
            padding: 25px;
            border: 2px solid transparent;
            position: relative;
            box-shadow: var(--shadow-heavy);
            margin: 20px 12px;
        }
        .detail-container::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 2px;
            border-radius: 40px;
            background: var(--gradient-prime);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.7;
            pointer-events: none;
        }
        .detail-images {
            width: 100%;
            height: 300px;
            position: relative;
            overflow: hidden;
            border-radius: 30px;
            margin-bottom: 25px;
            border: 3px solid var(--accent-primary);
            box-shadow: 0 0 30px rgba(0,255,200,0.4);
        }
        .detail-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            background: rgba(10, 20, 18, 0.7);
            padding: 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            margin: 25px 0;
            backdrop-filter: blur(16px);
        }
        @media (min-width: 700px) {
            .detail-info { grid-template-columns: repeat(2, 1fr); }
        }
        .info-item { display: flex; flex-direction: column; gap: 5px; }
        .info-label {
            font-family: var(--font-display);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(90deg, #00ffc3, #7b2cff, #00ffc3);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shineText 3s linear infinite;
            font-weight: 600;
        }
        .info-label i {
            font-size: 1.3rem;
            filter: drop-shadow(0 0 8px var(--accent-primary));
            color: var(--accent-primary);
            background: none;
            animation: neonPulse 1.8s infinite alternate;
        }
        @keyframes shineText { 0%{background-position:0%;} 100%{background-position:200%;} }
        @keyframes neonPulse {
            0% { filter: drop-shadow(0 0 5px var(--accent-primary)); opacity: 0.9; }
            100% { filter: drop-shadow(0 0 15px var(--accent-primary)) drop-shadow(0 0 25px #7b2cff); opacity: 1; }
        }
        .info-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            font-family: var(--font-display);
            text-shadow: 0 0 10px rgba(0,255,200,0.3);
        }

        /* ডাউনলোড বাটন গ্রুপ */
        .download-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        .download-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 40px;
            background: var(--gradient-prime);
            border: none;
            color: #0a0e0f;
            font-weight: 700;
            font-size: 1.3rem;
            border-radius: 80px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            box-shadow: 0 0 25px var(--accent-primary);
            overflow: hidden;
        }
        .download-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 80%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: skewX(-25deg);
            animation: beam 3s infinite ease-in-out;
        }
        .download-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--accent-primary); }

        /* ভিডিও টিউটোরিয়াল */
        .video-tutorial-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-secondary);
            font-size: 1rem;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid var(--accent-secondary);
            border-radius: 50px;
            transition: 0.3s;
            background: rgba(123,44,255,0.05);
        }
        .video-tutorial-link:hover {
            background: var(--accent-secondary);
            color: #0a0e0f;
            box-shadow: 0 0 20px var(--accent-secondary);
        }

        /* ===== কমেন্ট সেকশন ===== */
        .comments-section {
            margin-top: 30px;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }
        .comments-title {
            color: var(--accent-primary);
            font-family: var(--font-display);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .comment-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .comment-input-area input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            color: white;
        }
        .comment-input-area button {
            background: var(--gradient-prime);
            border: none;
            border-radius: 50px;
            padding: 0 20px;
            font-weight: 700;
            cursor: pointer;
        }
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .comment-item {
            background: rgba(20,26,28,0.5);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--glass-border);
        }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .comment-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--gradient-prime);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .comment-author {
            color: var(--accent-primary);
            font-weight: 600;
        }
        .comment-time {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-left: auto;
        }
        .comment-text {
            color: var(--text-body);
            font-size: 0.95rem;
            padding-left: 45px;
        }

        /* ===== লিডারবোর্ড পৃষ্ঠা ===== */
        .leaderboard-container {
            padding: 20px 12px;
        }
        .leaderboard-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .leaderboard-header h2 {
            font-size: 2rem;
            font-family: var(--font-display);
            background: var(--gradient-prime);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .leaderboard-card {
            background: var(--gradient-card);
            border-radius: 30px;
            padding: 25px;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 30px var(--accent-primary);

    <script>
        // ---------- Firebase কনফিগারেশন ----------
        const firebaseConfig = {
            apiKey: "AIzaSyDsG13om9NfrTQVeVB1LozOOoUMFN9nogM",
            authDomain: "unity-resource-zone.firebaseapp.com",
            projectId: "unity-resource-zone",
            storageBucket: "unity-resource-zone.firebasestorage.app",
            messagingSenderId: "117893725125",
            appId: "1:117893725125:web:2c2e38953454979d8ae9ac",
            measurementId: "G-G9DMKT53E5"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ---------- গ্লোবাল ভেরিয়েবল ----------
        let currentUser = null;
        let currentScreen = 'posts';
        let currentPostId = null;
        let favorites = []; // favourite post ids
        let userPoints = 0;
        let sessionStartTime = null;
        let downloadedPosts = new Set(); // এক পোস্টে একাধিক ডাউনলোড আটকাতে
        let leaderboardData = [];

        // ---------- ডেমো পোস্ট ডেটা (Firestore এর পরিবর্তে লোকাল) ----------
        const postsData = [
            {
                id: 'skin1',
                title: 'নিওন স্পোর্টস স্কিন',
                description: 'আধুনিক নিওন লাইন সহ স্পোর্টস বাস স্কিন।',
                images: [
                    'https://images.unsplash.com/photo-1570125909232-eb263c188f7e?w=400&h=300&fit=crop',
                    'https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?w=400&h=300&fit=crop'
                ],
                category: 'skins',
                name: 'Neon Sports Skin',
                supported: 'BUSSID v3.7 - v4.0',
                size: '12 MB',
                creator: 'PARVEZ AKANDA',
                download: '#',
                videoUrl: '#',
                date: '2025-03-15'
            },
            {
                id: 'mod1',
                title: 'রিয়ালিস্টিক ফুয়েল মড',
                description: 'বাস্তবসম্মত জ্বালানি খরচ ও পাম্প সিস্টেম।',
                images: [
                    'https://images.unsplash.com/photo-1591280063444-d3c70a3d92b6?w=400&h=300&fit=crop',
                    'https://images.unsplash.com/photo-1580674684081-7617fbf3d745?w=400&h=300&fit=crop'
                ],
                category: 'mods',
                name: 'Realistic Fuel Mod',
                supported: 'BUSSID v3.8 - v4.1',
                size: '5 MB',
                creator: 'ATIKUR RAHAMAN',
                download: '#',
                videoUrl: '#',
                date: '2025-03-18'
            }
        ];

        // ---------- লগইন/রেজিস্ট্রেশন ----------
        function signUp(email, password, displayName) {
            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    return userCredential.user.updateProfile({ displayName: displayName }).then(() => {
                        // Firestore এ ইউজার ডকুমেন্ট তৈরি
                        return db.collection('users').doc(userCredential.user.uid).set({
                            username: displayName,
                            email: email,
                            points: 0,
                            birthDate: '',
                            avatar: '',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    });
                })
                .then(() => {
                    document.getElementById('signupMessage').innerText = 'সফলভাবে নিবন্ধন সম্পন্ন!';
                    closeModal();
                })
                .catch((error) => {
                    document.getElementById('signupMessage').innerText = error.message;
                });
        }

        function signIn(email, password) {
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('loginMessage').innerText = 'সফলভাবে লগইন!';
                    closeModal();
                })
                .catch((error) => {
                    document.getElementById('loginMessage').innerText = error.message;
                });
        }

        function signOut() {
            auth.signOut();
        }

        // লগইন স্টেট পর্যবেক্ষণ
        auth.onAuthStateChanged(async (user) => {
            const loginBtn = document.getElementById('loginBtn');
            const userInfo = document.getElementById('userInfo');
            const userNameSpan = document.getElementById('userName');
            const postsScreen = document.getElementById('posts-screen');
            
            if (user) {
                // ইউজার লগইন করলে UI আপডেট
                loginBtn.style.display = 'none';
                userInfo.style.display = 'inline';
                userNameSpan.innerText = user.displayName || user.email;
                currentUser = user;
                
                // ইউজার ডেটা লোড
                await loadUserData(user.uid);
                
                // সেশন ট্র্যাকিং শুরু
                sessionStartTime = Date.now();
                startPointTracking();
                
                // কন্টেন্ট দেখাও
                postsScreen.style.display = 'block';
                renderPosts();
            } else {
                // লগইন না করলে কন্টেন্ট লুকাও
                loginBtn.style.display = 'inline';
                userInfo.style.display = 'none';
                currentUser = null;
                postsScreen.style.display = 'none'; // লগইন না করলে পোস্ট দেখাবে না
                // মডাল দেখাও
                document.getElementById('loginModal').style.display = 'block';
            }
        });

        // ইউজার ডেটা লোড
        async function loadUserData(uid) {
            const doc = await db.collection('users').doc(uid).get();
            if (doc.exists) {
                userPoints = doc.data().points || 0;
                favorites = doc.data().favorites || [];
            } else {
                // নতুন ইউজার
                userPoints = 0;
                favorites = [];
            }
        }

        // পয়েন্ট ট্র্যাকিং
        function startPointTracking() {
            setInterval(() => {
                if (currentUser && sessionStartTime) {
                    // প্রতি ১০ সেকেন্ডে ১ পয়েন্ট (০.১ প্রতি সেকেন্ডে ১ পয়েন্ট করতে ১০ সেকেন্ড)
                    const elapsed = Math.floor((Date.now() - sessionStartTime) / 10000);
                    if (elapsed > 0) {
                        userPoints += elapsed;
                        sessionStartTime = Date.now();
                        // Firestore আপডেট
                        db.collection('users').doc(currentUser.uid).update({
                            points: firebase.firestore.FieldValue.increment(elapsed)
                        });
                    }
                }
            }, 10000);
        }

        // পোস্ট রেন্ডার
        function renderPosts(filterCategory = 'all', searchTerm = '') {
            const grid = document.getElementById('postsGrid');
            let filtered = postsData;
            if (filterCategory !== 'all') {
                filtered = filtered.filter(p => p.category === filterCategory);
            }
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    p.description.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            grid.innerHTML = filtered.map(post => {
                const isFav = favorites.includes(post.id);
                return `
                <div class="post-card" data-id="${post.id}">
                    <div class="card-slider">
                        <div class="slider-container">
                            ${post.images.map((img, idx) => `<img src="${img}" class="slider-img ${idx === 0 ? 'active' : ''}">`).join('')}
                        </div>
                        <span class="category-tag-corner">${post.category.toUpperCase()}</span>
                    </div>
                    <div class="favorite-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${post.id}')">
                        <i class="fas fa-heart"></i>
                    </div>
                    <h3 class="card-title">${post.title}</h3>
                    <p class="card-desc">${post.description}</p>
                    <button class="detail-btn" onclick="showDetail('${post.id}')">
                        <i class="fas fa-eye"></i> <span>বিস্তারিত জানুন</span>
                    </button>
                </div>
            `}).join('');

            // স্লাইডার অ্যানিমেশন
            setTimeout(() => {
                document.querySelectorAll('.card-slider').forEach(slider => {
                    const imgs = slider.querySelectorAll('.slider-img');
                    if (imgs.length < 2) return;
                    let idx = 0;
                    setInterval(() => {
                        imgs[idx].classList.remove('active');
                        idx = (idx + 1) % imgs.length;
                        imgs[idx].classList.add('active');
                    }, 3000);
                });
            }, 200);
        }

        // ফেবারিট টগল
        async function toggleFavorite(postId) {
            if (!currentUser) return;
            const index = favorites.indexOf(postId);
            if (index === -1) {
                favorites.push(postId);
            } else {
                favorites.splice(index, 1);
            }
            await db.collection('users').doc(currentUser.uid).update({
                favorites: favorites
            });
            renderPosts();
        }

        // ডিটেইল দেখান
        function showDetail(postId) {
            const post = postsData.find(p => p.id === postId);
            if (!post) return;
            currentPostId = postId;
            
            let slides = post.images.map((img, idx) => `<img src="${img}" class="slider-img ${idx === 0 ? 'active' : ''}">`).join('');
            
            const detailHtml = `
                <div class="detail-images">
                    <div class="slider-container">${slides}</div>
                </div>
                <div class="detail-info">
                    <div class="info-item"><span class="info-label"><i class="fas fa-cube"></i> NAME</span><span class="info-value">${post.name}</span></div>
                    <div class="info-item"><span class="info-label"><i class="fas fa-mobile-alt"></i> SUPPORTED</span><span class="info-value">${post.supported}</span></div>
                    <div class="info-item"><span class="info-label"><i class="fas fa-database"></i> SIZE</span><span class="info-value">${post.size}</span></div>
                    <div class="info-item"><span class="info-label"><i class="fas fa-user-astronaut"></i> CREATOR</span><span class="info-value">${post.creator}</span></div>
                </div>
                <div class="download-wrapper">
                    <a href="${post.download}" target="_blank" class="download-btn" onclick="handleDownload('${post.id}')"><i class="fas fa-download"></i> ডাউনলোড NOW</a>
                    ${post.videoUrl ? `<a href="${post.videoUrl}" target="_blank" class="video-tutorial-link"><i class="fab fa-youtube"></i> কিভাবে সেটআপ করব?</a>` : ''}
                </div>
                <div class="comments-section">
                    <h4 class="comments-title"><i class="fas fa-comments"></i> মন্তব্য</h4>
                    <div class="comment-input-area">
                        <input type="text" id="commentInput" placeholder="মন্তব্য লিখুন...">
                        <button onclick="addComment()">পোস্ট করুন</button>
                    </div>
                    <div class="comment-list" id="commentList"></div>
                </div>
            `;
            
            document.getElementById('detailContainer').innerHTML = detailHtml;
            
            // ডিটেইল স্লাইডার
            setTimeout(() => {
                const imgs = document.querySelectorAll('.detail-images .slider-img');
                if (imgs.length > 1) {
                    let idx = 0;
                    setInterval(() => {
                        imgs[idx].classList.remove('active');
                        idx = (idx + 1) % imgs.length;
                        imgs[idx].classList.add('active');
                    }, 3000);
                }
            }, 300);
            
            loadComments(postId);
            
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('detail-screen').classList.add('active');
        }

        // ডাউনলোড হ্যান্ডলার
        function handleDownload(postId) {
            if (!currentUser) return;
            if (!downloadedPosts.has(postId)) {
                downloadedPosts.add(postId);
                // ৫ পয়েন্ট যোগ
                db.collection('users').doc(currentUser.uid).update({
                    points: firebase.firestore.FieldValue.increment(5)
                });
                userPoints += 5;
            }
        }

        // কমেন্ট ফাংশন
        async function loadComments(postId) {
            const snapshot = await db.collection('comments')
                .where('postId', '==', postId)
                .orderBy('timestamp', 'desc')
                .limit(20)
                .get();
            
            const list = document.getElementById('commentList');
            list.innerHTML = snapshot.docs.map(doc => {
                const data = doc.data();
                return `
                <div class="comment-item">
                    <div class="comment-header">
                        <div class="comment-avatar">${data.userName?.charAt(0) || 'U'}</div>
                        <span class="comment-author">${data.userName || 'অতিথি'}</span>
                        <span class="comment-time">${new Date(data.timestamp?.toDate()).toLocaleString('bn')}</span>
                    </div>
                    <div class="comment-text">${data.text}</div>
                </div>
            `}).join('');
        }

        async function addComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (!text || !currentUser || !currentPostId) return;
            
            await db.collection('comments').add({
                postId: currentPostId,
                userId: currentUser.uid,
                userName: currentUser.displayName,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            input.value = '';
            loadComments(currentPostId);
        }

        // লিডারবোর্ড রেন্ডার
        async function renderLeaderboard() {
            // রাত ১২টায় রিসেট (সিমুলেট)
            const today = new Date().toDateString();
            const leaderboardRef = db.collection('leaderboard').doc(today);
            const doc = await leaderboardRef.get();
            
            if (!doc.exists) {
                // নতুন দিন, পুরনো ডেটা মুছে ফেলো
                // এখানে আমরা শুধু টপ ইউজার দেখাব
                const users = await db.collection('users').orderBy('points', 'desc').limit(10).get();
                leaderboardData = users.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // নতুন ডকুমেন্ট তৈরি
                await leaderboardRef.set({ date: today, data: leaderboardData });
            } else {
                leaderboardData = doc.data().data || [];
            }
            
            // বর্তমান ইউজারের পয়েন্ট
            const currentUserPoints = userPoints;
            
            let html = `
                <div class="leaderboard-header"><h2>লিডারবোর্ড</h2></div>
                <div class="leaderboard-card">
                    <div class="top-user">
                        ${leaderboardData[0] ? `
                            <img src="${leaderboardData[0].avatar || 'https://via.placeholder.com/80'}" class="top-user-avatar">
                            <div class="top-user-info">
                                <h3>🏆 ${leaderboardData[0].username}</h3>
                                <p>চ্যাম্পিয়ন</p>
                            </div>
                            <div class="top-user-points">${leaderboardData[0].points}</div>
                        ` : '<p>কোনো ইউজার নেই</p>'}
                    </div>
                </div>
                <div class="current-user-points">
                    <span>আপনার পয়েন্ট</span>
                    <span>${currentUserPoints}</span>
                </div>
                <div class="leaderboard-list">
                    ${leaderboardData.slice(1).map((user, idx) => `
                        <div class="leaderboard-item">
                            <span class="rank">${idx+2}</span>
                            <img src="${user.avatar || 'https://via.placeholder.com/40'}" class="item-avatar">
                            <span class="item-name">${user.username}</span>
                            <span class="item-points">${user.points}</span>
                        </div>
                    `).join('')}
                </div>
            `;
            
            document.getElementById('leaderboardContainer').innerHTML = html;
        }

        // প্রোফাইল রেন্ডার
        async function renderProfile() {
            if (!currentUser) return;
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const userData = userDoc.data() || { username: currentUser.displayName, birthDate: '', avatar: '' };
            
            const html = `
                <div class="profile-header"><h2>প্রোফাইল</h2></div>
                <div class="profile-avatar-section">
                    <div class="avatar-wrapper">
                        <img src="${userData.avatar || 'https://via.placeholder.com/120'}" class="profile-avatar" id="profileAvatar">
                        <div class="avatar-upload-btn" onclick="uploadAvatar()">
                            <i class="fas fa-camera"></i>
                        </div>
                        <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
                    </div>
                    <div class="username-display">${userData.username}</div>
                    <div class="points-display">মোট পয়েন্ট: ${userPoints}</div>
                </div>
                <div class="profile-form">
                    <div class="form-group">
                        <label>ইউজারনেম (পরিবর্তন করা যাবে না)</label>
                        <input type="text" value="${userData.username}" class="readonly-field" readonly>
                    </div>
                    <div class="form-group">
                        <label>নাম</label>
                        <input type="text" id="profileName" value="${userData.name || ''}">
                    </div>
                    <div class="form-group">
                        <label>জন্ম তারিখ</label>
                        <input type="date" id="profileBirthDate" value="${userData.birthDate || ''}">
                    </div>
                    <button class="save-profile-btn" onclick="saveProfile()">সেভ করুন</button>
                </div>
                <div class="logout-section">
                    <button class="logout-profile-btn" onclick="signOut()">লগআউট</button>
                </div>
            `;
            
            document.getElementById('profileContainer').innerHTML = html;
        }

        // ছবি আপলোড
        function uploadAvatar() {
            document.getElementById('avatarInput').click();
        }

        async function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file || !currentUser) return;
            
            const storageRef = storage.ref(`avatars/${currentUser.uid}`);
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();
            
            await db.collection('users').doc(currentUser.uid).update({ avatar: url });
            document.getElementById('profileAvatar').src = url;
        }

        // প্রোফাইল সেভ
        async function saveProfile() {
            const name = document.getElementById('profileName').value;
            const birthDate = document.getElementById('profileBirthDate').value;
            
            await db.collection('users').doc(currentUser.uid).update({
                name: name,
                birthDate: birthDate
            });
            
            alert('প্রোফাইল আপডেট হয়েছে');
        }

        // ফেবারিট রেন্ডার
        async function renderFavorites() {
            const favPosts = postsData.filter(p => favorites.includes(p.id));
            const container = document.getElementById('favoritesContainer');
            
            if (favPosts.length === 0) {
                container.innerHTML = '<div class="empty-favorites">কোনো পছন্দের পোস্ট নেই</div>';
                return;
            }
            
            container.innerHTML = `
                <div class="favorites-header"><h2>আমার পছন্দ সমূহ</h2></div>
                <div class="posts-grid">
                    ${favPosts.map(post => `
                        <div class="post-card" data-id="${post.id}">
                            <div class="card-slider">
                                <div class="slider-container">
                                    ${post.images.map((img, idx) => `<img src="${img}" class="slider-img ${idx === 0 ? 'active' : ''}">`).join('')}
                                </div>
                                <span class="category-tag-corner">${post.category.toUpperCase()}</span>
                            </div>
                            <div class="favorite-btn active" onclick="toggleFavorite('${post.id}')">
                                <i class="fas fa-heart"></i>
                            </div>
                            <h3 class="card-title">${post.title}</h3>
                            <p class="card-desc">${post.description}</p>
                            <button class="detail-btn" onclick="showDetail('${post.id}')">
                                <i class="fas fa-eye"></i> <span>বিস্তারিত জানুন</span>
                            </button>
                        </div>
                    `).join('')}
                </div>
            `;
            
            // স্লাইডার অ্যানিমেশন
            setTimeout(() => {
                document.querySelectorAll('.card-slider').forEach(slider => {
                    const imgs = slider.querySelectorAll('.slider-img');
                    if (imgs.length < 2) return;
                    let idx = 0;
                    setInterval(() => {
                        imgs[idx].classList.remove('active');
                        idx = (idx + 1) % imgs.length;
                        imgs[idx].classList.add('active');
                    }, 3000);
                });
            }, 200);
        }

        // মডাল কন্ট্রোল
        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }

        function openTab(evt, tabName) {
            var tabcontent = document.getElementsByClassName('tabcontent');
            for (var i = 0; i < tabcontent.length; i++) {
                tabcontent[i].classList.remove('active');
            }
            var tablinks = document.getElementsByClassName('tablinks');
            for (var i = 0; i < tablinks.length; i++) {
                tablinks[i].classList.remove('active');
            }
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        // নেভিগেশন
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', async (e) => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                currentScreen = item.dataset.screen;
                
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                
                if (currentScreen === 'posts') {
                    document.getElementById('posts-screen').classList.add('active');
                } else if (currentScreen === 'leaderboard') {
                    await renderLeaderboard();
                    document.getElementById('leaderboard-screen').classList.add('active');
                } else if (currentScreen === 'profile') {
                    await renderProfile();
                    document.getElementById('profile-screen').classList.add('active');
                }
            });
        });

        // সার্চ ইভেন্ট
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            const category = document.getElementById('categoryFilter').value;
            renderPosts(category, e.target.value);
        });

        document.getElementById('categoryFilter')?.addEventListener('change', (e) => {
            const search = document.getElementById('searchInput').value;
            renderPosts(e.target.value, search);
        });

        // মডাল ইভেন্ট
        document.getElementById('loginBtn').addEventListener('click', () => {
            document.getElementById('loginModal').style.display = 'block';
        });

        document.querySelector('.close').addEventListener('click', closeModal);
        window.addEventListener('click', (event) => {
            if (event.target == document.getElementById('loginModal')) {
                closeModal();
            }
        });

        document.getElementById('loginSubmit').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            signIn(email, pass);
        });

        document.getElementById('signupSubmit').addEventListener('click', () => {
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const pass = document.getElementById('signupPassword').value;
            signUp(email, pass, name);
        });

        document.getElementById('logoutBtn').addEventListener('click', signOut);

        // ফ্লোটিং ব্যাক বাটন
        function hideDetail() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('posts-screen').classList.add('active');
        }

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js').catch(err => console.log(err));
            });
        }

        // মার্কি আপডেট
        function updateMarquee() {
            const titles = postsData.map(p => p.title);
            document.getElementById('globalMarquee').innerHTML = '⚡ ' + titles.join(' ⚡  ⚡ ') + ' ⚡';
        }
        updateMarquee();

        // প্রথম অবস্থায় লগইন মডাল দেখাও
        window.onload = () => {
            if (!currentUser) {
                document.getElementById('loginModal').style.display = 'block';
            }
        };
    </script>
</body>
</html>
